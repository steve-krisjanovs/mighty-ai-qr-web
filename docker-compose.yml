services:
  mighty-ai-qr-web:
    build: .
    container_name: mighty-ai-qr-web
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
      FREE_GENERATION_LIMIT: ${FREE_GENERATION_LIMIT:-10}
      DB_PATH: /data/mighty.db
    volumes:
      - mighty-qr-data:/data
    networks:
      - proxy_net

volumes:
  mighty-qr-data:

networks:
  proxy_net:
    external: true
