services:
  mighty-ai-qr-web:
    build: .
    container_name: mighty-ai-qr-web
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RUNNING_IN_DOCKER: "true"
      DB_PATH: /data/mighty.db
    volumes:
      - mighty-qr-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy_net

volumes:
  mighty-qr-data:

networks:
  proxy_net:
    external: true
