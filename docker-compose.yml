services:
  mighty-ai-qr-web:
    build: .
    container_name: mighty-ai-qr-web
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WEB_SEARCH_TOOL_VERSION: ${WEB_SEARCH_TOOL_VERSION:-web_search_20250305}
      RUNNING_IN_DOCKER: "true"
      DB_PATH: /data/mighty.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@mighty-ai-qr.com}
    volumes:
      - mighty-qr-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy_net

volumes:
  mighty-qr-data:

networks:
  proxy_net:
    external: true
