services:
  app:
    build: .
    container_name: mighty-ai-qr-web
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FREE_DAILY_LIMIT: ${FREE_DAILY_LIMIT:-100}
      RUNNING_IN_DOCKER: "true"
      DB_PATH: /data/mighty.db
    volumes:
      - mighty-qr-data:/data
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: mighty-ai-qr-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      - app

volumes:
  mighty-qr-data:
  caddy-data:
  caddy-config:

networks:
  internal:
